<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerva Network Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans">
    <div class="container mx-auto px-4 py-8">
        <header class="flex justify-between items-center border-b border-gray-700 pb-6 mb-8">
            <h1 class="text-3xl font-bold text-yellow-500 tracking-widest">MINERVA</h1>
            <span class="text-sm bg-gray-800 px-3 py-1 rounded-full border border-gray-600 text-gray-400">v0.1 - Local
                Mode</span>
        </header>

        <main class="text-center">
            <div class="bg-gray-800 p-8 rounded-lg shadow-xl inline-block w-full max-w-md">
                <p class="mb-6">Bienvenido, la red está en calma.</p>
                <button onclick="runScan()" id="scanBtn"
                    class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-8 rounded-lg transition duration-300 ease-in-out transform hover:scale-105">
                    Lanzar Escaneo
                </button>
            </div>

            <div id="results" class="mt-10 text-left bg-black p-4 rounded border border-green-900 hidden">
                <h2 class="text-green-500 mb-4 font-mono">> Resultados encontrados:</h2>
                <pre id="output" class="text-sm text-green-400 font-mono"></pre>
            </div>
        </main>
    </div>

    <script>
        async function runScan() {
            const btn = document.getElementById('scanBtn');
            const resultsDiv = document.getElementById('results');
            const output = document.getElementById('output');

            btn.innerText = "Buscando dispositivos...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.disabled = true;

            try {
                const response = await fetch('/scan');
                const data = await response.json();

                output.innerHTML = `
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-yellow-500 border-b border-gray-700">
                        <th class="py-2">IP</th>
                        <th class="py-2">Hostname</th>
                        <th class="py-2">Estado</th>
                        <th class="py-2">Acción</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        `;

                const tbody = document.getElementById('tableBody');
                data.forEach(device => {
                    const row = `
                <tr class="border-b border-gray-800 hover:bg-gray-800 transition">
                    <td class="py-3 font-mono">${device.ip}</td>
                    <td class="py-3 text-gray-400">${device.hostname}</td>
                    <td class="py-3"><span class="px-2 py-1 text-xs bg-green-900 text-green-300 rounded-full">Online</span></td>
                    <td class="py-3">
                        <button onclick="scanPorts('${device.ip}')" class="text-xs bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded">
                            Ver Puertos
                        </button>
                    </td>
                </tr>
            `;
                    tbody.innerHTML += row;
                });

                resultsDiv.classList.remove('hidden');
            } catch (error) {
                output.innerText = "Error al escanear: " + error;
            } finally {
                btn.innerText = "Lanzar Escaneo";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.disabled = false;
            }
        }

        async function scanPorts(ip) {
            const output = document.getElementById('output');

            const detailAreaId = `details-${ip.replace(/\./g, '-')}`;
            alert(`Iniciando escaneo profundo en ${ip}. Esto tardará unos segundos...`);

            try {
                const response = await fetch(`/scan_host/${ip}`);
                const ports = await response.json();

                let html = `<div class="mt-4 p-4 bg-gray-800 border-l-4 border-blue-500 rounded">
                        <h3 class="text-blue-400 font-bold mb-2">Servicios en ${ip}:</h3>`;

                if (ports.length === 0) {
                    html += `<p class="text-sm text-gray-500 italic">No se encontraron puertos abiertos comunes.</p>`;
                } else {
                    html += `<ul class="space-y-1 font-mono text-xs">`;
                    ports.forEach(p => {
                        html += `<li><span class="text-yellow-500">[${p.port}/${p.state}]</span> 
                         <span class="text-white">${p.name}</span> 
                         <span class="text-gray-400">(${p.product} ${p.version})</span></li>`;
                    });
                    html += `</ul>`;
                }
                html += `</div>`;

                output.innerHTML += html;

            } catch (error) {
                console.error("Error en el escaneo profundo:", error);
            }
        }
    </script>
</body>

</html>
